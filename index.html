<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cinematic Interface</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="scene">
    <img src="scene.png" id="bg" />

    <!-- 🔥 CORE GLOW -->
    <div id="coreGlow"></div>

    <!-- HOTSPOTS -->
    <div class="hotspot core"></div>
    <div class="hotspot book"></div>
    <div class="hotspot cup"></div>
    <div class="hotspot watch"></div>
    <div class="hotspot lamp"></div>
  </div>

  <!-- 🎬 OVERLAY -->
  <div id="overlay">
    <div id="overlayContent"></div>
    <div id="closeBtn">×</div>
  </div>

  <script src="main.js"></script>
</body>
</html>

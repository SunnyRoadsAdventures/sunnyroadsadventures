<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Protocol</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="loader">
  <div class="scan">Initializing Secure Access...</div>
</div>

<div id="gate">
  <div class="gate-text">Hold to authenticate</div>
</div>

<canvas id="bg"></canvas>

<div id="hud" class="hidden">
  <div id="clearance">CLEARANCE: LEVEL 1</div>
</div>

<main id="app" class="hidden">
  <section class="hero room" data-room="1">
    <h1>Access is not granted. It’s earned.</h1>
    <p class="sub">Some destinations aren’t on any map.</p>
  </section>

  <section class="portal room" id="portal" data-room="2">
    <div class="portal-inner">
      <h2>Your Next Assignment</h2>
    </div>
  </section>

  <section class="intel room" data-room="3">
    <div class="file" id="file">[ CLASSIFIED FILE ]</div>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="main.js"></script>
</body>
</html>

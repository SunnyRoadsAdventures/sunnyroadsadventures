<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Protocol</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="loader">
  <div class="scan">Initializing Secure Access...</div>
</div>

<div id="gate">
  <div class="gate-text">Hold to authenticate</div>
</div>

<canvas id="bg"></canvas>

<main id="app" class="hidden">
  <section class="hero">
    <h1>Access is not granted. It’s earned.</h1>
    <p class="sub">Some destinations aren’t on any map.</p>
  </section>

  <section class="portal" id="portal">
    <div class="portal-inner">
      <h2>Your Next Assignment</h2>
    </div>
  </section>

  <section class="intel">
    <div class="file">[ CLASSIFIED FILE ]</div>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
